<!doctype html>
<html lang="en" data-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <link rel="stylesheet" href="/src/styles.css" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>transcriber</title>
    <script type="module" src="/src/app.js" defer></script>
  </head>

  <body>
    <!-- Custom titlebar (frameless window): draggable, with view toggles + close -->
    <header class="titlebar">
      <div class="brand">
        <span class="dot" id="statusDot" title="idle"></span>
        <span class="brand-name">transcriber</span>
      </div>
      <div class="titlebar-actions">
        <button class="icon-btn" id="btnConfig" title="Configuration" aria-label="Configuration">
          <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
        </button>
        <button class="icon-btn" id="btnShortcuts" title="Shortcuts" aria-label="Shortcuts">
          <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="5" width="20" height="14" rx="2"/><path d="M6 9h.01M10 9h.01M14 9h.01M18 9h.01M6 13h.01M10 13h.01M14 13h.01M18 13h.01M8 17h8"/></svg>
        </button>
        <button class="icon-btn close" id="btnClose" title="Close (copies if auto-copy on)" aria-label="Close">
          <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 6 6 18M6 6l12 12"/></svg>
        </button>
      </div>
    </header>

    <!-- TRANSCRIPT VIEW -->
    <section class="view" id="viewTranscript">
      <div class="ta-wrap">
        <textarea id="transcript" spellcheck="false" placeholder="Transcription will appear here…"></textarea>
      </div>
      <div class="transcript-toolbar">
        <button class="pill" id="btnToggleRec">
          <span class="rec-icon"></span><span id="recLabel">Start</span>
        </button>
        <span class="viz" aria-hidden="true"><i></i><i></i><i></i><i></i><i></i><i></i><i></i><i></i><i></i></span>
        <span class="status-text" id="statusText"></span>
        <div class="spacer"></div>
        <span class="queue-chip" id="queueChip"></span>
        <button class="mini-btn" id="btnCopy" title="Copy (Ctrl+C)">Copy</button>
        <button class="mini-btn" id="btnClear" title="Clear (Ctrl+L)">Clear</button>
      </div>
    </section>

    <!-- CONFIG VIEW -->
    <section class="view hidden" id="viewConfig">
      <h2>Configuration</h2>
      <label>Endpoint URL
        <input type="url" id="cfgEndpoint" placeholder="https://openrouter.ai/api/v1/chat/completions" />
      </label>
      <label>API Key
        <input type="password" id="cfgApiKey" placeholder="sk-…" />
      </label>
      <label>Model
        <input type="text" id="cfgModel" placeholder="google/gemini-2.5-flash" />
      </label>
      <label class="check">
        <input type="checkbox" id="cfgAutoRecord" /> Auto-record on launch
      </label>
      <label class="check">
        <input type="checkbox" id="cfgAutoCopy" /> Auto-copy transcript on close
      </label>
      <div class="form-actions">
        <button class="mini-btn" id="btnConfigBack">Back</button>
        <button class="pill solid" id="btnConfigSave">Save</button>
      </div>
      <p class="save-status" id="cfgStatus"></p>
    </section>

    <!-- SHORTCUTS VIEW -->
    <section class="view hidden" id="viewShortcuts">
      <h2>Shortcuts</h2>
      <ul class="shortcuts">
        <li><kbd>Ctrl</kbd>+<kbd>M</kbd><span>Start / stop recording</span></li>
        <li><kbd>Ctrl</kbd>+<kbd>C</kbd><span>Copy transcript</span></li>
        <li><kbd>Ctrl</kbd>+<kbd>X</kbd><span>Cut transcript</span></li>
        <li><kbd>Ctrl</kbd>+<kbd>L</kbd><span>Clear transcript</span></li>
        <li><kbd>Esc</kbd><span>Copy (if enabled) &amp; quit</span></li>
      </ul>
      <p class="hint">Shortcuts are in-app only and fixed for now. Configurable / global shortcuts are planned.</p>
      <div class="form-actions">
        <button class="pill solid" id="btnShortcutsBack">Back</button>
      </div>
    </section>
  </body>
</html>
