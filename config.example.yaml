# Transcriber config — copy to ~/.config/transcriber/config.yaml
# Any key may be omitted; omitted keys keep the built-in defaults.

# Transcription model (OpenAI-compatible chat/completions).
model: mistralai/voxtral-small-24b-2507

# Optional: override endpoint / API key (otherwise taken from the in-app Config).
# endpoint: https://openrouter.ai/api/v1/chat/completions
# api_key: sk-...

# Retries on a failed transcription request. Total attempts = max_retries + 1,
# with exponential backoff (1s, 2s, 4s, 8s …) between attempts.
max_retries: 1

# Auto-paste: on close (Esc / close button), paste the transcript into whatever
# app was focused before. Linux/Wayland only — needs `wl-copy` (wl-clipboard),
# `ydotool`, and a running `ydotoold`. If those are missing, a warning is shown
# and the app falls back to plain clipboard copy. Set false to disable.
auto_paste: true
# Key sequence ydotool presses to paste. ctrl+shift+v works in terminals AND
# most GUI apps; plain ctrl+v is a no-op in terminals.
paste_key: ctrl+shift+v
# Delay (ms) before the paste keystroke fires, so focus has time to return to
# the previously-focused window after the transcriber hides.
paste_delay_ms: 800

# Voice commands. After each utterance is transcribed, its text is checked for a
# trigger phrase at the END — spoken on its own, or trailing a dictated sentence
# (the voice detector often fails to cut the phrase off cleanly). On a match the
# trigger is stripped and the action fires; any sentence before it is kept and
# pasted as normal content. Matching ignores case and punctuation. No key needed.
#
#   action  what to do. Supported: paste_enter_clear = paste the whole canvas
#           into the app behind the transcriber, press Enter, then clear it.
#   say     the phrase you speak.
#   emit    (optional) exact string to match instead of `say` — reserved for
#           later prompt-steering that pins the model's spelling of a codeword.
#
# Providing this key REPLACES the built-in default (strike and reload). Omit it
# to keep the default. Add multiple entries to map several phrases to an action.
commands:
  - action: paste_enter_clear
    say: strike and reload
# Key ydotool presses after the paste for paste_enter_clear (ydotool key name).
enter_key: Enter

# Voice-activity-detection tuning. Timings are in milliseconds.
vad:
  # Confidence (0–1) for a frame to START speech. Lower = more sensitive, so
  # soft/short phrases ("hello there") are picked up more readily.
  positive_speech_threshold: 0.5
  # Confidence (0–1) below which speech is considered ENDED.
  negative_speech_threshold: 0.5
  # Silence required before an utterance is finished. Higher = mid-sentence
  # pauses don't cut you off (but utterances finalize a bit later).
  silence_ms: 980
  # Minimum speech length to count as a valid utterance. Lower lets short
  # phrases through; too low also lets coughs/clicks through.
  min_speech_ms: 300
  # Pre-roll prepended before detected speech so the first word isn't clipped.
  # Deeper than reshka's 300ms to offset Silero v5's later onset detection.
  pre_speech_pad_ms: 700

# Theme: 5 base color tokens. Any CSS color works (hex, rgb(), etc). Omit a key
# to keep its default; the UI derives all other shades (borders, glows, muted
# text) from these automatically. Defaults shown below = the dark navy/cyan HUD.
# theme:
#   bg: "#070a11"      # window background (darkest)
#   panel: "#101c2b"   # raised surfaces / tiles
#   line: "#8fb2c9"    # borders + body/muted text base
#   accent: "#46e6f6"  # primary accent (listening, buttons, glow)
#   alert: "#ff5a6a"   # errors + recording-active state

# Extra transcription rules appended to the system prompt as bullet points (same
# mechanism as reshka). Omit the key entirely to send the base prompt only.
# config_instructions:
#   - Properly capitalize text. Add comma (,), question mark (?), etc where required.
#   - Transcribe "slash" as / in paths and identifiers (e.g. "data slash docs" → "data/docs").
#   - Prefer lowercase for anything that sounds like a technical identifier, path, or filename.
