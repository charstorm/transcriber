# Transcriber config — copy to ~/.config/transcriber/config.yaml
# Any key may be omitted; omitted keys keep the built-in defaults.

# Transcription model (OpenAI-compatible chat/completions).
model: mistralai/voxtral-small-24b-2507

# Optional: override endpoint / API key (otherwise taken from the in-app Config).
# endpoint: https://openrouter.ai/api/v1/chat/completions
# api_key: sk-...

# Retries on a failed transcription request. Total attempts = max_retries + 1,
# with exponential backoff (1s, 2s, 4s, 8s …) between attempts.
max_retries: 3

# Auto-paste: on close (Esc / close button), paste the transcript into whatever
# app was focused before. Linux/Wayland only — needs `wl-copy` (wl-clipboard),
# `ydotool`, and a running `ydotoold`. If those are missing, a warning is shown
# and the app falls back to plain clipboard copy. Set false to disable.
auto_paste: true
# Key sequence ydotool presses to paste. ctrl+shift+v works in terminals AND
# most GUI apps; plain ctrl+v is a no-op in terminals.
paste_key: ctrl+shift+v
# Delay (ms) before the paste keystroke fires, so focus has time to return to
# the previously-focused window after the transcriber hides.
paste_delay_ms: 800

# Voice-activity-detection tuning. Timings are in milliseconds.
vad:
  # Confidence (0–1) for a frame to START speech. Lower = more sensitive, so
  # soft/short phrases ("hello there") are picked up more readily.
  positive_speech_threshold: 0.5
  # Confidence (0–1) below which speech is considered ENDED.
  negative_speech_threshold: 0.35
  # Silence required before an utterance is finished. Higher = mid-sentence
  # pauses don't cut you off (but utterances finalize a bit later).
  silence_ms: 800
  # Minimum speech length to count as a valid utterance. Lower lets short
  # phrases through; too low also lets coughs/clicks through.
  min_speech_ms: 250
  # Pre-roll prepended before detected speech so the first word isn't clipped.
  pre_speech_pad_ms: 160
